---
engines:
  pmd-legacy:
    enabled: false
  eslint:
    enabled: false
exclude_paths:
  - "**/node_modules/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "**/__pycache__/**"
  - "**/data/**"
  - "**/chroma_db/**"
  - "**/frontend/.next/**"
  - "**/frontend/out/**"
  - "**/backend/logs/**"
  - "**/*.pyc"
  - "**/*.sqlite3"
  - "**/*.bin"
  - "**/*.pickle"
  - "**/*.log"
  - ".git/**"
